name: Desplegar a GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Vista previa en https://rmp-dev-mx.github.io/rmp.mx/
      # En el hosting definitivo (rmp.mx) no se definen y el build usa los defaults
      SITE: https://rmp-dev-mx.github.io
      BASE: /rmp.mx
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build con Astro
        uses: withastro/action@v3
        with:
          package-manager: pnpm@latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar a Pages
        id: deployment
        uses: actions/deploy-pages@v4
